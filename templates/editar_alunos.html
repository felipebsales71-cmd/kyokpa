<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Aluno - Kyok Pa</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="topo">
        <h1>EDITAR ALUNO</h1>
        <p>Atualize os dados do atleta</p>
    </header>

    <nav class="menu">
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('alunos') }}">Alunos</a>
        <a href="{{ url_for('cadastrar_aluno') }}">Cadastrar Aluno</a>
        <a href="{{ url_for('logout') }}">Sair</a>
    </nav>

    <main class="form-container">
        <form method="post" enctype="multipart/form-data" class="formulario">
            <label>Nome do aluno</label>
            <input type="text" name="nome" value="{{ aluno['nome'] }}" required>

            <label>Idade</label>
            <input type="text" name="idade" value="{{ aluno['idade'] }}" required>

            <label>Faixa</label>
            <input type="text" name="faixa" value="{{ aluno['faixa'] }}" required>

            <label>Data de nascimento</label>
            <input type="text" name="nascimento" value="{{ aluno['nascimento'] }}" required>

            <label>Responsável</label>
            <input type="text" name="responsavel" value="{{ aluno['responsavel'] }}" required>

            <label>Telefone</label>
            <input type="text" name="telefone" value="{{ aluno['telefone'] }}" required>

            <label>Local</label>
            <select name="local" required>
                {% for item in locais %}
                    <option value="{{ item }}" {% if item == aluno['local'] %}selected{% endif %}>{{ item }}</option>
                {% endfor %}
            </select>

            <label>Professor</label>
            <select name="professor" required>
                {% for item in professores %}
                    <option value="{{ item }}" {% if item == aluno['professor'] %}selected{% endif %}>{{ item }}</option>
                {% endfor %}
            </select>

            <label>Status</label>
            <select name="status" required>
                {% for item in status_opcoes %}
                    <option value="{{ item }}" {% if item == aluno['status'] %}selected{% endif %}>{{ item }}</option>
                {% endfor %}
            </select>

            <label>Data de matrícula</label>
            <input type="text" name="matricula" value="{{ aluno['matricula'] }}" required>

            <label>Observações</label>
            <textarea name="observacoes" rows="4">{{ aluno['observacoes'] }}</textarea>

            <label>Foto atual</label>
            {% if aluno["foto"] %}
                <img src="{{ url_for('static', filename='uploads/' + aluno['foto']) }}" class="foto-grande">
            {% else %}
                <p>Sem foto</p>
            {% endif %}

            <label>Trocar foto</label>
            <input type="file" name="foto" accept=".png,.jpg,.jpeg,.webp">

            <div class="linha-botoes">
                <button type="submit" class="btn">Salvar Alterações</button>
                <a href="{{ url_for('alunos') }}" class="btn-voltar">Voltar</a>
            </div>
        </form>
    </main>
</body>
</html>
